version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${DB_USER:-arxiv}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-arxiv_daily}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-arxiv}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI 后端
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-arxiv}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-arxiv_daily}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-https://api.openai.com/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v3-small}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE: ${LLM_API_BASE:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LANGUAGE: ${LANGUAGE:-Chinese}
      ARXIV_CATEGORIES: ${ARXIV_CATEGORIES:-cs.CV,cs.CL,cs.AI}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Vue 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
